inherits: configs/base.yaml
stage: ssl_spatial
data:
  train_manifest: D:\python\DA_DL_KPDL\artifacts\smoke_audit_tmp\data_prep\labels\labels_spatial_train.csv
  val_manifest: D:\python\DA_DL_KPDL\artifacts\smoke_audit_tmp\data_prep\labels\labels_spatial_val.csv
  test_manifest: D:\python\DA_DL_KPDL\artifacts\smoke_audit_tmp\data_prep\labels\labels_spatial_test.csv
  image_size: 224
  crops:
    global_crops: 2
    local_crops: 4
    local_size: 96
model:
  name: swav
  backbone: resnet18
  projection_dim: 128
  hidden_dim: 512
  n_prototypes: 300
  temperature: 0.1
  epsilon: 0.05
  sinkhorn_iterations: 3
optimizer:
  name: adamw
  lr: 0.0003
  weight_decay: 0.0001
target:
  epochs: 20
  batch_size: 16
  early_stopping_patience: 5
  max_knn_points: 0
checkpoint:
  monitor: val_knn
  mode: max
  save_last: true
