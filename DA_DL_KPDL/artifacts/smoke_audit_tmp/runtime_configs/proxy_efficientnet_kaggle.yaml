inherits: configs/base.yaml
stage: proxy_efficientnet
data:
  train_manifest: D:\python\DA_DL_KPDL\artifacts\smoke_audit_tmp\manifests\proxy_train.csv
  val_manifest: D:\python\DA_DL_KPDL\artifacts\smoke_audit_tmp\manifests\proxy_val.csv
  test_manifest: D:\python\DA_DL_KPDL\artifacts\smoke_audit_tmp\manifests\proxy_test.csv
  image_size: 224
model:
  name: efficientnet_b0
  pretrained: true
optimizer:
  name: adamw
  lr: 0.0003
  weight_decay: 0.01
target:
  epochs: 12
  batch_size: 16
  label_smoothing: 0.05
  early_stopping_patience: 3
checkpoint:
  monitor: val_recall_risky
  mode: max
