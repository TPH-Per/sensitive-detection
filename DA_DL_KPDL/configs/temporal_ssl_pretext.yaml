inherits: configs/base.yaml
stage: temporal_ssl_pretext

data:
  train_manifest: manifests/temporal_train.csv
  val_manifest: manifests/temporal_val.csv
  test_manifest: manifests/temporal_test.csv
  frames_per_clip: 64

model:
  name: task_prompted_transformer
  d_model: 768
  aux_dim: 6
  qformer_layers: 2

optimizer:
  name: adamw
  lr: 0.0002
  weight_decay: 0.01

target:
  epochs: 15
  batch_size: 4
  early_stopping_patience: 3
