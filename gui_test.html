<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Content Moderator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 800px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }

        .api-status {
            text-align: center;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }

        .api-status a {
            color: #818cf8;
            text-decoration: none;
        }

        .card {
            background: var(--card-bg);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid var(--border);
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 0.75rem;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .upload-icon {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        input[type="file"] {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0;
            cursor: pointer;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            margin-top: 1rem;
            font-size: 1rem;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .result-box {
            display: none;
            margin-top: 1.5rem;
            border-top: 1px solid var(--border);
            padding-top: 1.5rem;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .badge {
            display: inline-block;
            padding: 0.35rem 1rem;
            border-radius: 9999px;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .badge-safe {
            background: rgba(34, 197, 94, 0.15);
            color: var(--success);
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .badge-unsafe {
            background: rgba(239, 68, 68, 0.15);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        pre {
            background: #0f172a;
            padding: 1rem;
            border-radius: 0.5rem;
            overflow-x: auto;
            color: #a5b4fc;
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .preview-img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 0.5rem;
            margin: 1rem 0;
            display: none;
            object-fit: contain;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .tab {
            padding: 0.6rem 1.2rem;
            border-radius: 0.5rem;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            cursor: pointer;
            width: auto;
            margin-top: 0;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .tab:hover {
            border-color: var(--primary);
            color: var(--text);
        }

        .tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .score-bar {
            margin: 0.75rem 0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .score-label {
            font-size: 0.85rem;
            min-width: 80px;
            color: var(--text-muted);
        }

        .score-track {
            flex: 1;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .score-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .score-value {
            font-size: 0.85rem;
            min-width: 50px;
            text-align: right;
            font-weight: 600;
        }

        .loader {
            display: none;
            text-align: center;
            margin-top: 1.5rem;
            padding: 1rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(99, 102, 241, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 0.75rem;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--danger);
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            margin-top: 1rem;
            display: none;
        }

        .video-info {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.2);
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .api-input-group {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .api-input-group input[type="text"] {
            flex: 1;
            padding: 0.6rem 1rem;
            border-radius: 0.5rem;
            border: 1px solid var(--border);
            background: var(--card-bg);
            color: var(--text);
            font-size: 0.9rem;
            font-family: 'Inter', system-ui, sans-serif;
            outline: none;
            transition: border-color 0.2s;
            position: static;
            opacity: 1;
            width: auto;
            height: auto;
        }

        .api-input-group input[type="text"]:focus {
            border-color: var(--primary);
        }

        .api-input-group button {
            width: auto;
            margin-top: 0;
            padding: 0.6rem 1rem;
            font-size: 0.85rem;
            white-space: nowrap;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🛡️ AI Content Moderator</h1>
        <p class="subtitle">Violence & NSFW Detection System</p>
        <div class="api-input-group">
            <span style="font-size: 0.9rem;">🔗</span>
            <input type="text" id="apiUrlInput" placeholder="Nhập API URL (vd: https://xxx.ngrok-free.dev)" />
            <button onclick="connectAPI()">Kết nối</button>
            <span id="healthStatus" style="font-size: 0.85rem;"></span>
        </div>

        <div class="card">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('image')">🖼️ Image Scan</button>
                <button class="tab" onclick="switchTab('video')">🎬 Video Scan</button>
            </div>

            <!-- Image Upload -->
            <div id="imageTab">
                <div class="upload-area">
                    <span class="upload-icon">🖼️</span>
                    <div id="imageFileName" style="color: var(--text-muted);">Click hoặc kéo ảnh vào đây</div>
                    <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem;">JPG, PNG, WEBP</div>
                    <input type="file" id="imageInput" accept="image/*" onchange="previewImage(this)">
                </div>
                <img id="imagePreview" class="preview-img">
                <button onclick="scanImage()" id="btnScanImage">🔍 Quét ảnh</button>
            </div>

            <!-- Video Upload -->
            <div id="videoTab" style="display: none;">
                <div class="upload-area">
                    <span class="upload-icon">🎬</span>
                    <div id="videoFileName" style="color: var(--text-muted);">Click hoặc kéo video vào đây</div>
                    <div style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem;">MP4, AVI, MOV, MKV,
                        WebM — mọi codec đều OK</div>
                    <input type="file" id="videoInput" accept="video/*" onchange="updateVideoName(this)">
                </div>
                <button onclick="scanVideo()" id="btnScanVideo">🔍 Quét video</button>
            </div>

            <!-- Loader -->
            <div class="loader" id="loader">
                <div class="spinner"></div>
                <div id="loaderText">Đang xử lý...</div>
            </div>

            <!-- Error -->
            <div class="error-msg" id="errorMsg"></div>

            <!-- Result -->
            <div class="result-box" id="resultBox">
                <div id="statusBadge" class="badge"></div>
                <div id="videoInfoBox" class="video-info" style="display:none;"></div>
                <div id="scoreBars"></div>
                <details style="margin-top: 1rem;">
                    <summary style="cursor: pointer; color: var(--text-muted); font-size: 0.85rem;">📋 JSON Response
                    </summary>
                    <pre id="jsonResult" style="margin-top: 0.5rem;"></pre>
                </details>
            </div>
        </div>
    </div>

    <script>
        let BASE_URL = '';
        const HEADERS = { "ngrok-skip-browser-warning": "true" };
        let currentTab = 'image';

        // Load URL đã lưu từ localStorage
        window.addEventListener('load', () => {
            const saved = localStorage.getItem('moderation_api_url');
            if (saved) {
                document.getElementById('apiUrlInput').value = saved;
                BASE_URL = saved.replace(/\/$/, '');
                checkHealth();
            }
        });

        async function connectAPI() {
            const input = document.getElementById('apiUrlInput').value.trim().replace(/\/$/, '');
            if (!input) return;
            BASE_URL = input;
            localStorage.setItem('moderation_api_url', input);
            await checkHealth();
        }

        async function checkHealth() {
            const el = document.getElementById('healthStatus');
            el.innerHTML = '<span style="color: var(--warning)">⏳ Connecting...</span>';
            try {
                const r = await fetch(`${BASE_URL}/health`, { headers: HEADERS });
                if (r.ok) {
                    const data = await r.json();
                    el.innerHTML = '<span style="color: #22c55e">● Online</span> (' + data.device + ')';
                } else {
                    el.innerHTML = '<span style="color: #ef4444">● Offline</span>';
                }
            } catch {
                el.innerHTML = '<span style="color: #ef4444">● Offline</span>';
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('imageTab').style.display = tab === 'image' ? 'block' : 'none';
            document.getElementById('videoTab').style.display = tab === 'video' ? 'block' : 'none';
            document.getElementById('resultBox').style.display = 'none';
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('imagePreview').style.display = 'none';
            document.getElementById('imageInput').value = '';
            document.getElementById('videoInput').value = '';
            document.getElementById('imageFileName').innerText = 'Click hoặc kéo ảnh vào đây';
            document.getElementById('videoFileName').innerText = 'Click hoặc kéo video vào đây';
        }

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const img = document.getElementById('imagePreview');
                    img.src = e.target.result;
                    img.style.display = 'block';
                    document.getElementById('imageFileName').innerText = '📎 ' + input.files[0].name +
                        ' (' + (input.files[0].size / 1024).toFixed(0) + ' KB)';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function updateVideoName(input) {
            if (input.files && input.files[0]) {
                const size = input.files[0].size;
                let sizeStr = (size / 1024).toFixed(0) + ' KB';
                if (size > 1024 * 1024) sizeStr = (size / 1024 / 1024).toFixed(1) + ' MB';
                document.getElementById('videoFileName').innerText = '📎 ' + input.files[0].name + ' (' + sizeStr + ')';
            }
        }

        async function scanImage() {
            if (!BASE_URL) return showError("Vui lòng nhập API URL và nhấn Kết nối!");
            const fileInput = document.getElementById('imageInput');
            if (!fileInput.files[0]) return showError("Vui lòng chọn ảnh!");
            await sendRequest('/moderate/image', fileInput.files[0], 'image');
        }

        async function scanVideo() {
            if (!BASE_URL) return showError("Vui lòng nhập API URL và nhấn Kết nối!");
            const fileInput = document.getElementById('videoInput');
            if (!fileInput.files[0]) return showError("Vui lòng chọn video!");
            await sendRequest('/moderate/video', fileInput.files[0], 'video');
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.innerHTML = '❌ ' + msg;
            el.style.display = 'block';
        }

        async function sendRequest(endpoint, file, type) {
            const btn = type === 'image' ? document.getElementById('btnScanImage') : document.getElementById('btnScanVideo');
            const loader = document.getElementById('loader');
            const loaderText = document.getElementById('loaderText');
            const resultBox = document.getElementById('resultBox');
            const errorMsg = document.getElementById('errorMsg');

            btn.disabled = true;
            loader.style.display = 'block';
            resultBox.style.display = 'none';
            errorMsg.style.display = 'none';

            loaderText.innerText = type === 'video'
                ? 'Đang upload & phân tích video... (ffmpeg trích frames, có thể mất 1-3 phút)'
                : 'Đang phân tích ảnh...';

            const formData = new FormData();
            formData.append("file", file);
            if (type === 'video') formData.append("user_id", "gui_user");

            try {
                const res = await fetch(`${BASE_URL}${endpoint}`, {
                    method: 'POST',
                    body: formData,
                    headers: HEADERS
                });

                if (!res.ok) {
                    const errText = await res.text();
                    throw new Error(`API Error ${res.status}: ${errText}`);
                }

                const data = await res.json();

                // Check error from API
                if (data.error) {
                    showError(data.error);
                    loader.style.display = 'none';
                    btn.disabled = false;
                    return;
                }

                showResult(data, type);
            } catch (err) {
                showError(err.message);
            } finally {
                btn.disabled = false;
                loader.style.display = 'none';
            }
        }

        function getScoreColor(score) {
            if (score < 0.3) return '#22c55e';
            if (score < 0.7) return '#f59e0b';
            return '#ef4444';
        }

        function showResult(data, type) {
            const box = document.getElementById('resultBox');
            const badge = document.getElementById('statusBadge');
            const scoreBars = document.getElementById('scoreBars');
            const json = document.getElementById('jsonResult');
            const videoInfoBox = document.getElementById('videoInfoBox');

            box.style.display = 'block';
            json.innerText = JSON.stringify(data, null, 2);
            videoInfoBox.style.display = 'none';

            if (data.is_sensitive) {
                badge.className = 'badge badge-unsafe';
                badge.innerText = '⚠️ NHẠY CẢM — ' + data.categories.join(', ').toUpperCase();
            } else {
                badge.className = 'badge badge-safe';
                badge.innerText = '✅ AN TOÀN';
            }

            let barsHTML = '';

            if (type === 'image') {
                const vScore = data.violence?.score || 0;
                const nScore = data.nsfw?.score || 0;
                barsHTML += makeScoreBar('Violence', vScore);
                barsHTML += makeScoreBar('NSFW', nScore);
                if (data.nsfw?.all_scores) {
                    Object.entries(data.nsfw.all_scores).forEach(([label, score]) => {
                        if (label.toLowerCase() !== 'nsfw') barsHTML += makeScoreBar(label, score);
                    });
                }
            } else {
                const d = data.details || {};
                const vRatio = d.violence?.ratio || 0;
                const nRatio = d.nsfw?.ratio || 0;

                // Video info box
                videoInfoBox.style.display = 'block';
                videoInfoBox.innerHTML = `
                📊 <strong>${d.sampled_frames}</strong> frames analyzed / ${d.total_frames} total
                &nbsp;|&nbsp; ${d.fps} FPS
                &nbsp;|&nbsp; ${d.duration ? d.duration + 's' : ''}
                &nbsp;|&nbsp; ${d.codec || ''} ${d.resolution || ''}
            `;

                barsHTML += makeScoreBar('Violence', vRatio, `${d.violence?.sensitive_count || 0} frames`);
                barsHTML += makeScoreBar('NSFW', nRatio, `${d.nsfw?.sensitive_count || 0} frames`);
            }

            scoreBars.innerHTML = barsHTML;
        }

        function makeScoreBar(label, score, extra = '') {
            const pct = (score * 100).toFixed(1);
            const color = getScoreColor(score);
            return `
            <div class="score-bar">
                <span class="score-label">${label}</span>
                <div class="score-track">
                    <div class="score-fill" style="width: ${pct}%; background: ${color};"></div>
                </div>
                <span class="score-value" style="color: ${color}">${pct}%</span>
                ${extra ? `<span style="font-size:0.75rem; color: var(--text-muted);">${extra}</span>` : ''}
            </div>
        `;
        }
    </script>

</body>

</html>
